<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phrasal-Filmer AR</title>
    <!-- Mind-AR ve A-Frame Kütüphaneleri -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        
        /* Başlangıç Ekranı */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; text-align: center;
        }

        #start-btn {
            padding: 15px 30px; font-size: 20px; background: #2196F3;
            color: white; border: none; border-radius: 50px; cursor: pointer;
            margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* Kamera Çerçevesi / HUD */
        #hud {
            position: fixed; top: 20px; width: 100%; text-align: center;
            color: white; z-index: 999; display: none; text-shadow: 1px 1px 2px black;
        }
    </style>
</head>

<body>
    <!-- Giriş Ekranı -->
    <div id="overlay">
        <h2>Phrasal-Filmer</h2>
        <p>Kamerayı kullanmak ve videoyu aktifleştirmek için butona basın.</p>
        <button id="start-btn">AR DENEYİMİNİ BAŞLAT</button>
    </div>

    <!-- Bilgi Ekranı -->
    <div id="hud">Kamerayı Kartın Üzerine Tutun</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./cuw.mind; autoStart: false; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <!-- Videoyu muted (sessiz) ve playsinline ile tanımlıyoruz -->
            <video id="ar-video" src="cuw.mp4" 
                preload="auto" loop crossorigin="anonymous" 
                webkit-playsinline playsinline muted>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- Hedef Bulunduğunda Videoyu Göster -->
        <a-entity mindar-image-target="targetIndex: 0" id="target-entity">
            <a-video src="#ar-video" width="1" height="0.55" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const hud = document.getElementById('hud');
        const video = document.getElementById('ar-video');
        const sceneEl = document.querySelector('a-scene');
        const targetEl = document.getElementById('target-entity');

        startBtn.addEventListener('click', () => {
            // 1. ADIM: Android için video kilidini aç (En önemli kısım)
            video.play().then(() => {
                video.pause(); // Sadece kilidi açtık
                video.currentTime = 0;
            }).catch(e => console.error("Video kilidi açılamadı:", e));

            // 2. ADIM: AR Sistemini başlat
            sceneEl.systems["mindar-image-system"].start(); 
            
            overlay.style.display = 'none';
            hud.style.display = 'block';
        });

        // Hedef Algılama Olayları
        targetEl.addEventListener("targetFound", event => {
            console.log("Hedef Bulundu");
            hud.textContent = "Video Oynatılıyor...";
            video.play();
        });

        targetEl.addEventListener("targetLost", event => {
            console.log("Hedef Kayboldu");
            hud.textContent = "Kamerayı Kartın Üzerine Tutun";
            video.pause();
        });
    </script>
</body>
</html>
